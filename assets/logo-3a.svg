<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060A1A"/>
      <stop offset="100%" stop-color="#0B0820"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#5C8CFF"/>
      <stop offset="45%" stop-color="#2E6BFF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="320" rx="72" fill="url(#bgGrad)"/>

  <circle cx="160" cy="160" r="93" fill="none" stroke="rgba(120,150,255,0.35)" stroke-width="2" stroke-dasharray="6 6"/>

  <circle cx="160" cy="160" r="64" fill="url(#orbGrad)" filter="url(#orbGlow)"/>
  <text x="160" y="179" font-family="Sora,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#FFFFFF" text-anchor="middle">IA</text>

  <rect x="224" y="86" width="22" height="22" rx="8" fill="#25D366" filter="url(#dotGlow)"/>
  <rect x="72" y="208" width="22" height="22" rx="8" fill="#5C8CFF" filter="url(#dotGlow)"/>

  <path id="arcTop3a" d="M 52 160 A 108 108 0 0 1 268 160" fill="none"/>
  <path id="arcBot3a" d="M 44 160 A 116 116 0 0 0 276 160" fill="none"/>
  <text font-family="Sora,-apple-system,sans-serif" font-size="17" font-weight="700" letter-spacing="5" fill="#93A0C4">
    <textPath href="#arcTop3a" startOffset="50%" text-anchor="middle">SMART</textPath>
  </text>
  <text font-family="Sora,-apple-system,sans-serif" font-size="17" font-weight="700" letter-spacing="4" fill="#93A0C4">
    <textPath href="#arcBot3a" startOffset="50%" text-anchor="middle">CONSULTING</textPath>
  </text>
</svg>
