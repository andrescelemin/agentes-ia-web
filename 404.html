<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Agentes IA</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="alternate icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#06060c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06060c;--text:#f3f3f8;--text-muted:#9c9cb0;--violet:#a855f7;--cyan:#22d3ee;
    --gradient:linear-gradient(135deg,var(--violet) 0%,var(--cyan) 100%);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;text-align:center;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 20% 20%,rgba(124,58,237,.25),transparent 55%),
                      radial-gradient(circle at 80% 80%,rgba(34,211,238,.18),transparent 55%);
  }
  .wrap{max-width:520px;padding:24px;}
  .code{
    font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(4rem,14vw,7rem);line-height:1;
    background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;
  }
  h1{font-family:'Sora',sans-serif;font-size:1.5rem;margin:0 0 14px;}
  p{color:var(--text-muted);margin:0 0 32px;font-size:1.02rem;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;background:var(--gradient);color:#fff;
    padding:14px 28px;border-radius:100px;font-weight:600;text-decoration:none;font-size:.95rem;
    transition:transform .25s;
  }
  .btn:hover{transform:translateY(-3px);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Esta página no existe</h1>
    <p>Puede que el enlace esté roto o que la página se haya movido. Vuelve al inicio para seguir explorando.</p>
    <a href="/" class="btn">← Volver al inicio</a>
  </div>
</body>
</html>
